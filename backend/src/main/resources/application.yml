server:
  port: 8080

spring:
  application:
    name: junkiverse-backend

  # H2 数据库配置（MVP阶段）
  datasource:
    url: jdbc:h2:mem:junkiverse
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（开发时调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 跨域配置
cors:
  allowed-origins: "*"

# AI API 配置（后续接入）
ai:
  image-api:
    url: ""
    key: ""
  text-api:
    url: ""
    key: ""

# 日志
logging:
  level:
    com.junkiverse: DEBUG
    org.springframework.web: INFO
