<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 平台选择</title>
<style>
  :root {
    --bg-primary: #f5f5f7;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e5e5e7;
    --border: #d1d1d6;
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --success: #34c759;
    --selected-bg: #e8f4fd;
    --selected-border: #0071e3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1d1d1f;
      --bg-secondary: #2d2d2f;
      --bg-tertiary: #3d3d3f;
      --border: #424245;
      --text-primary: #f5f5f7;
      --text-secondary: #86868b;
      --text-tertiary: #636366;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --selected-bg: rgba(10, 132, 255, 0.15);
      --selected-border: #0a84ff;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 2rem;
    line-height: 1.5;
  }
  h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .options { display: flex; flex-direction: column; gap: 0.75rem; max-width: 640px; }
  .option {
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }
  .option:hover { border-color: var(--accent); }
  .option.selected { background: var(--selected-bg); border-color: var(--selected-border); }
  .option .letter {
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    width: 1.75rem; height: 1.75rem;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.85rem; flex-shrink: 0;
  }
  .option.selected .letter { background: var(--accent); color: white; }
  .option .content { flex: 1; }
  .option .content h3 { font-size: 0.95rem; margin-bottom: 0.15rem; }
  .option .content p { color: var(--text-secondary); font-size: 0.85rem; margin: 0; }
  .tip {
    margin-top: 1.5rem;
    padding: 0.75rem 1rem;
    background: var(--bg-secondary);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    max-width: 640px;
  }
  .tip strong { color: var(--text-primary); }
</style>
</head>
<body>

<h2>MVP 用什么平台？</h2>
<p class="subtitle">核心闭环是拍照抠图 → 拼贴 → AI生成，不同平台的开发成本和验证速度差异很大</p>

<div class="options">
  <div class="option" data-choice="web" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>网页版（推荐）</h3>
      <p>H5 单页应用，手机浏览器直接用，不用下载。开发快，验证成本最低，分享链接即可传播。</p>
    </div>
  </div>

  <div class="option" data-choice="wechat" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>微信小程序</h3>
      <p>在微信生态内传播力强，拍照/分享都很方便，但需要审核，且 AI 能力调用有限制。</p>
    </div>
  </div>

  <div class="option" data-choice="android" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Android App</h3>
      <p>原生体验最好，拍照和图像处理能力最强，但开发周期长，用户获取成本高，不适合 MVP。</p>
    </div>
  </div>
</div>

<div class="tip">
  <strong>💡 建议：</strong>MVP 先用网页版快速验证核心玩法是否有趣，用户喜欢之后再考虑做小程序或 App。
</div>

<script>
function toggleSelect(el) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}
</script>

</body>
</html>
